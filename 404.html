<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Devakumar A | Portfolio</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect trick
      // When GitHub serves a 404 for deep links, this script encodes the path
      // into the query string and redirects to index.html, which then reads it back
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
